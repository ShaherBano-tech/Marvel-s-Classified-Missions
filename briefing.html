<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Briefing - Marvel's Classified Missions</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topbar">
        <div class="header-left">
            <img src="Images/Shield.png" alt="Shield Logo" class="shield-logo">
            <h1>S.H.I.E.L.D.</h1>
        </div>

        <div class="header-right">
            <p>Agent Shadow</p>
            <img src="Images/agent.png" alt="Agent Logo" class="agent-logo">
        </div>
    </header>

    <main class="briefing-screen briefing-live-screen">

        <section class="briefing-call">
            <h2>Classified - Live Briefing</h2>

            <div class="call-grid">
                <div><img src="Images/logo-blackw.png" alt="Black Widow"></div>
                <div><img src="Images/logo-iron.png" alt="Iron Man"></div>
                <div><img src="Images/logo-thor.png" alt="Thor"></div>

                <div><img src="Images/logo-hulk.png" alt="Hulk"></div>
                <div><img src="Images/logo-hawkeye.png" alt="Hawkeye"></div>
                <div><img src="Images/logo-cap.png" alt="Captain America"></div>

                <div class="chat-box">
                    <p><span>Iron Man:</span> I told you it would work.</p>
                    <p><span>Captain America:</span> You also said it was impossible to fail.</p>
                    <p><span>Iron Man:</span> Details.</p>
                    <p>Thor: A victory is a victory.</p>
                    <p><span>Iron Man:</span> See? Thor gets it.</p>
                    <p><span>Captain America:</span> Don’t encourage him.</p>

                    <div class="chat-input">Type...</div>
                </div>

                <div><img src="Images/logo-nick.png" alt="S.H.I.E.L.D."></div>

                <div class="you-box">
                    <p>You</p>
                    <div class="camera-frame mini-camera-frame briefing-camera-frame">
                        <video id="briefingVideo" autoplay muted playsinline></video>
                        <img src="Images/you.png" alt="You" class="camera-fallback" id="briefingFallback">
                        <div class="briefing-filter-layer" id="briefingFilterLayer" aria-hidden="true"></div>
                    </div>
                </div>
            </div>

            <div class="call-controls">
    <button type="button" class="filter-toggle active" id="filterToggle">
        <img src="Images/briefing1.png" alt="Toggle filters">
    </button>

    <button type="button">
        <img src="Images/cam.png" alt="Camera">
    </button>

    <button type="button">
        <img src="Images/mic.png" alt="Microphone">
    </button>

    <button type="button" class="hangup" id="hangupCall" data-next-page="resultaat.html">
        <img src="Images/ophangen.png" alt="Hang up">
    </button>
</div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
