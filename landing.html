<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing - Marvel's Classified Missions</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="header-left">
            <img src="Images/Shield.png" alt="Shield Logo" class="shield-logo">
            <h1>S.H.I.E.L.D.</h1>
        </div>

        <div class="header-right">
            <p>Agent Shadow</p>
            <img src="Images/agent.png" alt="Agent Logo" class="agent-logo">
        </div>
    </header>

    <main class="landing-screen">
        <section class="info-panel agent-info">
            <p>Algemene informatie van<br>de agent</p>
        </section>

        <section class="info-panel mission-info">
            <p>Informatie van<br>andere lopende<br>missies</p>
        </section>

        <section class="news-panel">
            <p>Overige nieuws binnen de organisatie(zoals<br>een succesvolle missie)</p>
        </section>

        <section class="dossier-area">
            <h2>Dossiers bekijken</h2>

            <div class="folder-row">
                <a href="dossier.html" class="folder-button">
                    <img src="Images/map.png" alt="Marvel dossier map">
                </a>

                <a href="dossier.html" class="folder-button">
                    <img src="Images/map.png" alt="Marvel dossier map">
                </a>

                <a href="dossier.html" class="folder-button">
                    <img src="Images/map.png" alt="Marvel dossier map">
                </a>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="#">Agent Profile</a>
            <a href="#">Hero Database</a>
            <a href="#">Previous Missions</a>
            <a href="#">Mission Archive</a>
        </nav>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
